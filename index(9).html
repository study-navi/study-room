<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自習室ログ｜スプレッドシート同期版</title>
  <style>
    :root{--navy:#143b73;--blue:#2563eb;--light:#f3f7ff;--gold:#f6b73c;--text:#1f2937;--muted:#6b7280;--border:#d9e2f3;--danger:#dc2626;--ok:#16a34a;--bg:#eef5ff}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eef5ff,#fff);color:var(--text)}
    header{background:var(--navy);color:#fff;padding:20px 16px 24px;text-align:center;border-bottom:5px solid var(--gold)} header h1{margin:0;font-size:24px;letter-spacing:.04em} header p{margin:8px 0 0;font-size:14px;opacity:.9}
    main{max-width:980px;margin:0 auto;padding:18px 14px 48px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}.tab{border:1px solid var(--border);background:#fff;color:var(--navy);padding:13px 10px;border-radius:14px;font-weight:700;font-size:15px;box-shadow:0 4px 14px rgba(20,59,115,.08)}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 8px 24px rgba(20,59,115,.08)}.card h2{margin:0 0 12px;color:var(--navy);font-size:20px}.note{font-size:13px;color:var(--muted);line-height:1.7;margin:0 0 14px}
    label{display:block;font-weight:700;margin:13px 0 6px;color:#243b64} input,select,textarea{width:100%;padding:12px;border:1px solid #cdd8ea;border-radius:12px;font-size:16px;background:#fff} textarea{min-height:92px;resize:vertical;line-height:1.6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{width:100%;border:0;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:800;background:var(--blue);color:#fff;margin-top:12px;box-shadow:0 8px 20px rgba(37,99,235,.22);cursor:pointer}.btn.secondary{background:#fff;color:var(--navy);border:1px solid var(--border);box-shadow:none}.btn.gold{background:var(--gold);color:#442c00}.btn.danger{background:var(--danger);color:#fff}.btn.small{padding:8px 10px;border-radius:10px;font-size:12px;margin:3px;width:auto;box-shadow:none}.btn:disabled{opacity:.55;cursor:not-allowed}
    .status{margin-top:12px;padding:12px;border-radius:12px;font-weight:700;display:none}.status.ok{display:block;background:#eaf8ef;color:#166534;border:1px solid #bbf7d0}.status.err{display:block;background:#fff1f2;color:#991b1b;border:1px solid #fecdd3}.hidden{display:none!important}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:10px 0 16px}.sumBox{background:var(--light);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}.sumBox b{display:block;color:var(--navy);font-size:20px}.sumBox span{font-size:12px;color:var(--muted)}
    .tableWrap{overflow-x:auto;border:1px solid var(--border);border-radius:14px} table{border-collapse:collapse;width:100%;min-width:1100px;background:#fff} th,td{border-bottom:1px solid #e5eaf5;padding:10px 9px;font-size:13px;text-align:left;vertical-align:top} th{background:#f1f6ff;color:var(--navy);white-space:nowrap}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#1d4ed8;font-weight:700;font-size:12px}.mini{font-size:12px;color:var(--muted)}
    .teacherTop{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap}.teacherTop .mini{margin:0}.modalBg{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;padding:14px;z-index:10}.modal{background:#fff;border-radius:18px;padding:18px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}.modal h3{margin:0 0 8px;color:var(--navy)}
    @media(max-width:640px){.grid,.summary{grid-template-columns:1fr} header h1{font-size:21px} .teacherTop{display:block}}
  </style>
</head>
<body>
  <header><h1>自習室ログ</h1><p>入室・退室・学習内容をかんたん記録</p></header>
  <main>
    <div class="tabs"><button class="tab active" onclick="showPage('student')">生徒入力</button><button class="tab" onclick="showPage('teacher')">先生確認</button></div>

    <section id="studentPage" class="card">
      <h2>今日の自習記録</h2><p class="note">自習室を利用したら、退室前に記録を送信してください。スプレッドシート設定後は、どの端末からでも記録が同期されます。</p>
      <form id="recordForm">
        <label>名前</label><input id="name" placeholder="例：山田 太郎" required />
        <div class="grid"><div><label>学年</label><select id="grade" required><option value="">選択してください</option><option>小学生</option><option>中1</option><option>中2</option><option>中3</option><option>高1</option><option>高2</option><option>高3</option><option>既卒</option></select></div><div><label>科目</label><select id="subject" required><option value="">選択してください</option><option>英語</option><option>数学</option><option>国語</option><option>理科</option><option>社会</option><option>物理</option><option>化学</option><option>生物</option><option>日本史</option><option>世界史</option><option>地理</option><option>情報</option><option>その他</option></select></div></div>
        <div class="grid"><div><label>入室時間</label><input id="startTime" type="time" required /></div><div><label>退室時間</label><input id="endTime" type="time" required /></div></div>
        <label>今日やった内容</label><textarea id="content" placeholder="例：学校ワークp.32〜38、英単語100個、数学IA 二次関数" required></textarea>
        <div class="grid"><div><label>集中度</label><select id="focus" required><option value="">選択してください</option><option value="5">★★★★★ とても集中できた</option><option value="4">★★★★ 集中できた</option><option value="3">★★★ 普通</option><option value="2">★★ あまり集中できなかった</option><option value="1">★ 集中できなかった</option></select></div><div><label>達成度</label><select id="achievement" required><option value="">選択してください</option><option value="5">★★★★★ 予定以上</option><option value="4">★★★★ 予定通り</option><option value="3">★★★ だいたい完了</option><option value="2">★★ 少し残った</option><option value="1">★ ほとんど進まなかった</option></select></div></div>
        <label>先生へのコメント・質問</label><textarea id="comment" placeholder="例：次回、数学のこの単元を質問したいです。"></textarea>
        <button class="btn" type="submit">記録を送信する</button><div id="formStatus" class="status"></div>
      </form>
    </section>

    <section id="teacherPage" class="card hidden">
      <div id="teacherLock">
        <h2>先生確認画面</h2><p class="note">先生画面は先生IDと合言葉でロックされています。</p>
        <label>先生ID</label><input id="teacherId" autocomplete="username" placeholder="先生IDを入力" />
        <label>合言葉</label><input id="teacherPassword" type="password" autocomplete="current-password" placeholder="合言葉を入力" />
        <button class="btn" onclick="teacherLogin()">先生画面を開く</button><div id="loginStatus" class="status"></div>
      </div>
      <div id="teacherPanel" class="hidden">
        <div class="teacherTop"><div><h2>先生確認画面</h2><p class="mini">スプレッドシートから最新データを読み込みます。編集・削除は先生ログイン後だけ操作できます。</p></div><button class="btn secondary small" onclick="teacherLogout()">ロックする</button></div>
        <div class="summary"><div class="sumBox"><b id="sumCount">0</b><span>記録数</span></div><div class="sumBox"><b id="sumMinutes">0</b><span>合計分数</span></div><div class="sumBox"><b id="sumStudents">0</b><span>生徒数</span></div></div>
        <div class="grid"><button class="btn secondary" onclick="loadSheetRecords()">スプレッドシートから最新表示</button><button class="btn gold" onclick="downloadCSV()">CSVで出力</button></div><div id="syncStatus" class="status"></div>
        <div class="tableWrap" style="margin-top:14px"><table><thead><tr><th>操作</th><th>日付</th><th>名前</th><th>学年</th><th>科目</th><th>時間</th><th>分数</th><th>集中</th><th>達成</th><th>内容</th><th>コメント</th></tr></thead><tbody id="recordRows"></tbody></table></div>
      </div>
    </section>
  </main>

  <div id="editModal" class="modalBg hidden"><div class="modal"><h3>記録を編集</h3><p class="note">先生画面から入力内容を修正できます。</p><form id="editForm">
    <input id="editId" type="hidden" />
    <div class="grid"><div><label>日付</label><input id="editDate" required /></div><div><label>名前</label><input id="editName" required /></div></div>
    <div class="grid"><div><label>学年</label><input id="editGrade" required /></div><div><label>科目</label><input id="editSubject" required /></div></div>
    <div class="grid"><div><label>入室時間</label><input id="editStart" type="time" required /></div><div><label>退室時間</label><input id="editEnd" type="time" required /></div></div>
    <div class="grid"><div><label>集中度</label><select id="editFocus" required><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div><div><label>達成度</label><select id="editAchievement" required><option value="5">5</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div></div>
    <label>内容</label><textarea id="editContent" required></textarea><label>コメント</label><textarea id="editComment"></textarea>
    <div class="grid"><button class="btn" type="submit">保存する</button><button class="btn secondary" type="button" onclick="closeEdit()">キャンセル</button></div><div id="editStatus" class="status"></div>
  </form></div></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxH55su_yeIxtUN_Ibi7Tjtpn9nPufbdM8HuddaEpUGzwkuIvzSBx0lLc3vw5HTCj6U/exec"; // Apps ScriptのウェブアプリURL
  const TEACHER_ID = "teacher"; // apps_script.gs側と同じ先生IDに変更
  const TEACHER_PASSWORD = "1234"; // apps_script.gs側と同じ合言葉に変更
  const $ = id => document.getElementById(id);
  const todayJP = () => new Date().toLocaleDateString('ja-JP');
  const isTeacher = () => sessionStorage.getItem('teacherUnlocked') === 'yes';
  const teacherAuth = () => ({teacherId: TEACHER_ID, password: TEACHER_PASSWORD});
  let sheetRecords = [];

  function showPage(page){
    $('studentPage').classList.toggle('hidden',page!=='student');
    $('teacherPage').classList.toggle('hidden',page!=='teacher');
    document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(page==='student'&&i===0)||(page==='teacher'&&i===1)));
    if(page==='teacher') updateTeacherView();
  }

  function updateTeacherView(){
    const ok=isTeacher();
    $('teacherLock').classList.toggle('hidden',ok);
    $('teacherPanel').classList.toggle('hidden',!ok);
    if(ok) loadSheetRecords();
  }

  function teacherLogin(){
    const status=$('loginStatus');
    if($('teacherId').value.trim()===TEACHER_ID && $('teacherPassword').value===TEACHER_PASSWORD){
      sessionStorage.setItem('teacherUnlocked','yes');
      $('teacherId').value='';
      $('teacherPassword').value='';
      status.className='status';
      updateTeacherView();
    }else{
      status.className='status err';
      status.textContent='先生IDまたは合言葉が違います。';
    }
  }

  function teacherLogout(){sessionStorage.removeItem('teacherUnlocked');updateTeacherView();}
  function calcMinutes(start,end){const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);let s=sh*60+sm,e=eh*60+em;if(e<s)e+=1440;return Math.max(0,e-s)}
  function stars(n){n=Number(n||0);return '★★★★★'.slice(0,n)+'☆☆☆☆☆'.slice(0,5-n)}
  function getLocalRecords(){return JSON.parse(localStorage.getItem('studyRoomRecords')||'[]')}
  function setLocalRecords(records){localStorage.setItem('studyRoomRecords',JSON.stringify(records))}
  function saveLocal(record){const records=getLocalRecords();records.unshift(record);setLocalRecords(records)}

  async function postToSheet(payload){
    if(!GAS_URL){ throw new Error('GAS_URL未設定'); }
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }

  function jsonp(params){
    if(!GAS_URL) return Promise.reject(new Error('GAS_URL未設定'));
    return new Promise((resolve,reject)=>{
      const cb='gasCallback_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const script=document.createElement('script');
      const url=new URL(GAS_URL);
      Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
      url.searchParams.set('callback',cb);
      window[cb]=(data)=>{delete window[cb];script.remove();resolve(data)};
      script.onerror=()=>{delete window[cb];script.remove();reject(new Error('読み込みに失敗しました'))};
      script.src=url.toString();
      document.body.appendChild(script);
    });
  }

  async function sendToSheet(record){await postToSheet({action:'add',record});}
  async function updateSheet(record){await postToSheet({action:'update',...teacherAuth(),record});}
  async function deleteSheet(id){await postToSheet({action:'delete',...teacherAuth(),id});}

  async function loadSheetRecords(){
    if(!isTeacher()) return;
    const status=$('syncStatus');
    if(!GAS_URL){
      status.className='status err';
      status.textContent='GAS_URLが未設定です。Apps ScriptのウェブアプリURLを index.html に貼り付けてください。現在はこの端末内の記録だけ表示します。';
      sheetRecords=getLocalRecords();
      renderRecords(sheetRecords);
      return;
    }
    status.className='status ok';
    status.textContent='スプレッドシートを読み込み中です。';
    try{
      const res=await jsonp({action:'list',...teacherAuth()});
      if(res.result!=='success') throw new Error(res.message||'読み込みエラー');
      sheetRecords=res.records||[];
      setLocalRecords(sheetRecords);
      renderRecords(sheetRecords);
      status.className='status ok';
      status.textContent=`同期しました。${sheetRecords.length}件の記録を表示しています。`;
    }catch(err){
      status.className='status err';
      status.textContent='スプレッドシートの読み込みに失敗しました。GAS_URL、デプロイ設定、先生ID・合言葉を確認してください。';
      sheetRecords=getLocalRecords();
      renderRecords(sheetRecords);
    }
  }

  $('recordForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const record={id:'rec_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),date:todayJP(),timestamp:new Date().toISOString(),name:$('name').value.trim(),grade:$('grade').value,subject:$('subject').value,startTime:$('startTime').value,endTime:$('endTime').value,minutes:calcMinutes($('startTime').value,$('endTime').value),content:$('content').value.trim(),focus:$('focus').value,achievement:$('achievement').value,comment:$('comment').value.trim()};
    const status=$('formStatus');
    if(record.minutes<=0){status.className='status err';status.textContent='時間を確認してください。';return}
    saveLocal(record);
    try{
      await sendToSheet(record);
      status.className='status ok';
      status.textContent=`保存しました。自習時間：${record.minutes}分`;
    }catch(err){
      status.className='status err';
      status.textContent=`端末内には保存しました。スプレッドシート同期にはGAS_URL設定が必要です。自習時間：${record.minutes}分`;
    }
    $('recordForm').reset();
    $('endTime').value=new Date().toTimeString().slice(0,5);
  });

  function currentRecords(){return sheetRecords.length ? sheetRecords : getLocalRecords()}

  function renderRecords(records=currentRecords()){
    if(!isTeacher())return;
    $('sumCount').textContent=records.length;
    $('sumMinutes').textContent=records.reduce((a,r)=>a+Number(r.minutes||0),0);
    $('sumStudents').textContent=new Set(records.map(r=>r.name).filter(Boolean)).size;
    $('recordRows').innerHTML=records.map(r=>`<tr><td><button class="btn small secondary" onclick="openEdit('${r.id}')">編集</button><button class="btn small danger" onclick="deleteRecord('${r.id}')">削除</button></td><td>${escapeHtml(r.date||'')}</td><td><b>${escapeHtml(r.name||'')}</b></td><td>${escapeHtml(r.grade||'')}</td><td><span class="pill">${escapeHtml(r.subject||'')}</span></td><td>${escapeHtml(r.startTime||'')}〜${escapeHtml(r.endTime||'')}</td><td>${Number(r.minutes||0)}分</td><td>${stars(r.focus)}</td><td>${stars(r.achievement)}</td><td>${escapeHtml(r.content||'')}</td><td>${escapeHtml(r.comment||'')}</td></tr>`).join('')||'<tr><td colspan="11" class="mini">まだ記録がありません。</td></tr>'
  }

  function openEdit(id){
    if(!isTeacher())return;
    const r=currentRecords().find(x=>x.id===id);
    if(!r)return;
    $('editId').value=r.id;$('editDate').value=r.date||'';$('editName').value=r.name||'';$('editGrade').value=r.grade||'';$('editSubject').value=r.subject||'';$('editStart').value=r.startTime||'';$('editEnd').value=r.endTime||'';$('editFocus').value=r.focus||'3';$('editAchievement').value=r.achievement||'3';$('editContent').value=r.content||'';$('editComment').value=r.comment||'';$('editStatus').className='status';$('editModal').classList.remove('hidden')
  }

  function closeEdit(){$('editModal').classList.add('hidden')}

  $('editForm').addEventListener('submit',async e=>{
    e.preventDefault();
    if(!isTeacher())return;
    const id=$('editId').value;
    const records=currentRecords();
    const idx=records.findIndex(r=>r.id===id);
    if(idx<0)return;
    const updated={...records[idx],date:$('editDate').value.trim(),name:$('editName').value.trim(),grade:$('editGrade').value.trim(),subject:$('editSubject').value.trim(),startTime:$('editStart').value,endTime:$('editEnd').value,minutes:calcMinutes($('editStart').value,$('editEnd').value),focus:$('editFocus').value,achievement:$('editAchievement').value,content:$('editContent').value.trim(),comment:$('editComment').value.trim(),editedAt:new Date().toISOString()};
    records[idx]=updated;
    sheetRecords=records;
    setLocalRecords(records);
    try{await updateSheet(updated)}catch(err){console.warn(err)}
    $('editStatus').className='status ok';
    $('editStatus').textContent='保存しました。';
    renderRecords(records);
    setTimeout(()=>{closeEdit();loadSheetRecords();},500)
  });

  async function deleteRecord(id){
    if(!isTeacher())return;
    if(!confirm('この記録を削除しますか？'))return;
    const records=currentRecords().filter(r=>r.id!==id);
    sheetRecords=records;
    setLocalRecords(records);
    try{await deleteSheet(id)}catch(err){console.warn(err)}
    renderRecords(records);
    setTimeout(loadSheetRecords,500);
  }

  function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

  function downloadCSV(){
    if(!isTeacher())return;
    const records=currentRecords();
    const header=['日付','名前','学年','科目','入室','退室','分数','集中度','達成度','内容','コメント'];
    const rows=records.map(r=>[r.date,r.name,r.grade,r.subject,r.startTime,r.endTime,r.minutes,r.focus,r.achievement,r.content,r.comment]);
    const csv=[header,...rows].map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='自習室ログ.csv';a.click();
  }

  window.addEventListener('load',()=>{$('endTime').value=new Date().toTimeString().slice(0,5);updateTeacherView();});
</script>
</body>
</html>
