<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>自習室記録アプリ</title>
<style>
:root{--main:#2563eb;--dark:#143b73;--bg:#f3f7ff;--card:#fff;--line:#dbe5f5;--danger:#dc2626;--ok:#16a34a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,sans-serif;background:linear-gradient(135deg,#eef5ff,#fff);color:#172033}.wrap{max-width:1100px;margin:auto;padding:20px}header{background:linear-gradient(135deg,var(--dark),var(--main));color:white;border-radius:22px;padding:24px;box-shadow:0 10px 25px #143b7330}h1{margin:0;font-size:28px}.tabs{display:flex;gap:10px;margin:18px 0;flex-wrap:wrap}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 18px;font-weight:700;cursor:pointer}.tab.active{background:var(--main);color:white}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 6px 18px #143b7312}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}label{font-weight:700;font-size:14px}input,select,textarea{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;font-size:16px;margin-top:6px;background:#fff}textarea{min-height:90px}.btn{border:0;border-radius:12px;background:var(--main);color:#fff;font-weight:800;padding:13px 18px;cursor:pointer}.btn.sub{background:#64748b}.btn.danger{background:var(--danger)}.btn.ok{background:var(--ok)}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.msg{padding:12px;border-radius:12px;margin-top:12px;background:#eff6ff;border:1px solid #bfdbfe}.hide{display:none}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:900px}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;font-size:14px}th{background:#f8fbff;position:sticky;top:0}td button{margin:2px}.small{font-size:13px;color:#64748b}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:14px}.stat b{font-size:24px;color:var(--main)}@media(max-width:700px){.grid,.stats{grid-template-columns:1fr}h1{font-size:23px}.wrap{padding:12px}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>自習室記録アプリ</h1><p>生徒は記録を送信、先生はログインして確認・編集・削除できます。</p></header>
<div class="tabs"><button class="tab active" onclick="showTab('student')">生徒入力</button><button class="tab" onclick="showTab('teacher')">先生画面</button></div>
<section id="student" class="card">
<h2>自習記録を入力</h2>
<div class="grid">
<div><label>日付<input id="date" type="date"></label></div><div><label>名前<input id="name" placeholder="例：山田太郎"></label></div>
<div><label>学年<select id="grade"><option>中1</option><option>中2</option><option>中3</option><option>高1</option><option>高2</option><option>高3</option><option>その他</option></select></label></div>
<div><label>科目<select id="subject"><option>英語</option><option>数学</option><option>国語</option><option>理科</option><option>社会</option><option>物理</option><option>化学</option><option>生物</option><option>日本史</option><option>世界史</option><option>その他</option></select></label></div>
<div><label>入室時間<input id="startTime" type="time"></label></div><div><label>退室時間<input id="endTime" type="time"></label></div>
<div><label>集中度<select id="focus"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></label></div>
<div><label>達成度<select id="achievement"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></label></div>
</div>
<label>学習内容<textarea id="content" placeholder="例：数学ワーク p.20〜25"></textarea></label>
<label>コメント<textarea id="comment" placeholder="質問・先生に伝えたいこと"></textarea></label>
<div class="row"><button class="btn" onclick="submitRecord()">送信する</button><span class="small">送信後、Googleスプレッドシートに保存されます。</span></div>
<div id="studentMsg"></div>
</section>
<section id="teacher" class="card hide">
<h2>先生画面</h2>
<div id="loginBox" class="card">
<div class="grid"><div><label>先生ID<input id="teacherId" value="teacher"></label></div><div><label>パスワード<input id="teacherPass" type="password" placeholder="初期：1234"></label></div></div>
<button class="btn" onclick="teacherLogin()">ログイン</button><div class="small">初期設定：teacher / 1234</div>
</div>
<div id="teacherPanel" class="hide">
<div class="stats"><div class="stat">記録数<br><b id="statCount">0</b></div><div class="stat">合計分数<br><b id="statMinutes">0</b></div><div class="stat">平均集中度<br><b id="statFocus">0</b></div></div>
<div class="row card"><input id="search" placeholder="名前・科目・内容で検索" oninput="renderTable()"><button class="btn sub" onclick="loadRecords()">最新表示</button><button class="btn ok" onclick="downloadCSV()">CSV出力</button></div>
<div class="tableWrap"><table><thead><tr><th>日付</th><th>名前</th><th>学年</th><th>科目</th><th>時間</th><th>分数</th><th>集中</th><th>達成</th><th>内容</th><th>コメント</th><th>操作</th></tr></thead><tbody id="tbody"></tbody></table></div>
</div>
</section>
</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxYbjE0ZO9B-kdn1HbQU1pD7q8p11RL6aKA4zfNiV1yb1ZXGJulGcazf9670xm9zVAp/exec';
let records=[];let authed=false;
document.getElementById('date').valueAsDate=new Date();
function showTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab').forEach(b=>{if((id==='student'&&b.textContent.includes('生徒'))||(id==='teacher'&&b.textContent.includes('先生')))b.classList.add('active')});document.getElementById('student').classList.toggle('hide',id!=='student');document.getElementById('teacher').classList.toggle('hide',id!=='teacher')}
function msg(el,text,ok=true){document.getElementById(el).innerHTML='<div class="msg">'+text+'</div>'}
function minutes(s,e){if(!s||!e)return '';const a=s.split(':').map(Number),b=e.split(':').map(Number);let m=(b[0]*60+b[1])-(a[0]*60+a[1]);if(m<0)m+=1440;return m}
async function api(action,data={}){const url=GAS_URL+'?action='+encodeURIComponent(action)+'&t='+Date.now();const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});const text=await res.text();try{return JSON.parse(text)}catch(e){throw new Error('JSON以外の応答: '+text.slice(0,80))}}
async function submitRecord(){const data={date:date.value,name:name.value.trim(),grade:grade.value,subject:subject.value,startTime:startTime.value,endTime:endTime.value,minutes:minutes(startTime.value,endTime.value),focus:focus.value,achievement:achievement.value,content:content.value.trim(),comment:comment.value.trim()};if(!data.name){msg('studentMsg','名前を入力してください。',false);return}try{msg('studentMsg','送信中です...');const r=await api('add',data);if(r.result==='success'){msg('studentMsg','保存しました。自習時間：'+(data.minutes||0)+'分');content.value='';comment.value=''}else{msg('studentMsg','保存できませんでした：'+r.message,false)}}catch(e){msg('studentMsg','通信エラーです。GitHubのindex.htmlまたはApps Script URLを確認してください。',false)}}
function teacherLogin(){if(teacherId.value==='teacher'&&teacherPass.value==='1234'){authed=true;loginBox.classList.add('hide');teacherPanel.classList.remove('hide');loadRecords()}else alert('IDまたはパスワードが違います')}
async function loadRecords(){try{const r=await api('list',{});records=r.records||[];renderTable()}catch(e){alert('取得できませんでした')}}
function renderTable(){const q=search.value?.toLowerCase()||'';const rows=records.filter(x=>JSON.stringify(x).toLowerCase().includes(q));statCount.textContent=rows.length;statMinutes.textContent=rows.reduce((s,x)=>s+(Number(x['自習分数'])||0),0);const fs=rows.map(x=>Number(x['集中度'])||0).filter(Boolean);statFocus.textContent=fs.length?(fs.reduce((a,b)=>a+b,0)/fs.length).toFixed(1):'0';tbody.innerHTML=rows.map(r=>`<tr><td>${r['日付']||''}</td><td>${r['名前']||''}</td><td>${r['学年']||''}</td><td>${r['科目']||''}</td><td>${r['入室時間']||''}-${r['退室時間']||''}</td><td>${r['自習分数']||''}</td><td>${r['集中度']||''}</td><td>${r['達成度']||''}</td><td>${r['学習内容']||''}</td><td>${r['コメント']||''}</td><td><button onclick='editRecord(${JSON.stringify(r).replace(/'/g,"&#39;")})'>編集</button><button onclick='deleteRecord("${r['ID']}")'>削除</button></td></tr>`).join('')}
async function editRecord(r){const data={id:r['ID'],teacherId:teacherId.value,teacherPass:teacherPass.value,date:prompt('日付',r['日付']||''),name:prompt('名前',r['名前']||''),grade:prompt('学年',r['学年']||''),subject:prompt('科目',r['科目']||''),startTime:prompt('入室時間',r['入室時間']||''),endTime:prompt('退室時間',r['退室時間']||''),minutes:prompt('自習分数',r['自習分数']||''),focus:prompt('集中度',r['集中度']||''),achievement:prompt('達成度',r['達成度']||''),content:prompt('学習内容',r['学習内容']||''),comment:prompt('コメント',r['コメント']||'')};const res=await api('update',data);alert(res.result==='success'?'更新しました':res.message);loadRecords()}
async function deleteRecord(id){if(!confirm('削除しますか？'))return;const res=await api('delete',{id,teacherId:teacherId.value,teacherPass:teacherPass.value});alert(res.result==='success'?'削除しました':res.message);loadRecords()}
function downloadCSV(){const headers=['ID','送信日時','日付','名前','学年','科目','入室時間','退室時間','自習分数','集中度','達成度','学習内容','コメント'];const csv=[headers.join(',')].concat(records.map(r=>headers.map(h=>'"'+String(r[h]||'').replace(/"/g,'""')+'"').join(','))).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='自習室ログ.csv';a.click()}
</script>
</body></html>
